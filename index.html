<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sassoferrato Scienza</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%);
            color: #ffffff;
            text-align: center;
            padding: 1rem;
            overflow: hidden;
        }

        .container {
            max-width: 800px;
            animation: fadeIn 1.5s ease-out;
        }

        h1 {
            font-size: clamp(2.5rem, 8vw, 5rem);
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 1.5rem;
            background: linear-gradient(90deg, #ffffff 0%, #a8edea 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        p {
            font-size: clamp(1rem, 2.5vw, 1.25rem);
            opacity: 0.85;
            font-weight: 300;
            letter-spacing: 0.02em;
        }

        .date {
            margin-top: 2rem;
            font-size: clamp(0.95rem, 2vw, 1.1rem);
            font-weight: 400;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            opacity: 0.75;
            padding: 0.75rem 1.5rem;
            border: 1px solid rgba(255, 255, 255, 0.25);
            border-radius: 999px;
            display: inline-block;
        }

        .dots {
            display: inline-block;
            margin-left: 0.1em;
        }

        .dots span {
            opacity: 0;
            animation: blink 1.4s infinite;
        }

        .dots span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .dots span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes blink {
            0%, 100% { opacity: 0; }
            50% { opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Stiamo arrivando<span class="dots"><span>.</span><span>.</span><span>.</span></span></h1>
        <p>Sassoferrato Scienza</p>
        <div class="date">Venerdì 24 luglio 2026</div>
    </div>
</body>
</html>
